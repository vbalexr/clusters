apiVersion: v1
kind: Service
metadata:
  name: immich
  labels:
    lb-pool: private
spec:
  type: LoadBalancer
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
---
apiVersion: v1
kind: Service
metadata:
  name: immich-machine-learning
spec:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: immich
spec:
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Ti
