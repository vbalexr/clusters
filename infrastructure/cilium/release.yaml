apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: "1.19.1"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system

  install:
    crds: CreateReplace

  upgrade:
    crds: CreateReplace

  values:
    cni:
      exclusive: false
      binPath: /var/lib/rancher/k3s/data/cni/
      confPath: /var/lib/rancher/k3s/agent/etc/cni/net.d
    operator:
      replicas: 1
    kubeProxyReplacement: strict
    k8sServiceHost: "magi.vbalex.com"
    k8sServicePort: 6443
    bgpControlPlane:
      enabled: true
    ipv4:
      enabled: true
    ipv6:
      enabled: true
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
    ipam:
      mode: "cluster-pool"
      operator:
        clusterPoolIPv4PodCIDRList: ["10.42.0.0/16"]
        clusterPoolIPv4MaskSize: 24
        clusterPoolIPv6PodCIDRList: ["fd7a:42::/56"]
        clusterPoolIPv6MaskSize: 64